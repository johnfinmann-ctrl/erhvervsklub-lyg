<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Erhverv, netværk og golfoplevelser i Lyngbygaard Golf">
  <meta name="theme-color" content="#0d2b1a">

  <!-- iOS PWA — disse tags er kritiske for korrekt installation på iPhone/iPad -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="LYG Erhverv">
  <!-- apple-touch-icon: relativ sti, virker i enhver GitHub Pages undermappe -->
  <link rel="apple-touch-icon" sizes="192x192" href="./icons/icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="./icons/icon-512.png">
  <!-- Startup image placeholder (iOS bruger dette til splash) -->
  <link rel="apple-touch-startup-image" href="./icons/icon-512.png">

  <!-- Android/Chrome PWA -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="application-name" content="LYG Erhverv">

  <title>Lyngbygaard Erhvervsklub</title>

  <!-- Relative paths — works in any subfolder on GitHub Pages -->
  <link rel="manifest" href="./manifest.json?v=4.2">
  <link rel="stylesheet" href="./style.css?v=4.2">

  <style>
    /* Inline splash to prevent FOUC */
    body { background: #0d2b1a; }
    #splash {
      position: fixed; inset: 0;
      background: #0d2b1a;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 9999;
      transition: opacity .4s;
    }
    #splash .s-logo { font-size: 3rem; margin-bottom: 1rem; }
    #splash .s-navn { color: #b8973a; font-size: 1.1rem; font-weight: 800;
      font-family: -apple-system,sans-serif; letter-spacing: .04em; }
    #splash .s-sub  { color: rgba(255,255,255,.5); font-size: .8rem;
      font-family: -apple-system,sans-serif; margin-top: .3rem; }
  </style>
</head>
<body>

<!-- Splash screen -->
<div id="splash">
  <div class="s-logo">⛳</div>
  <div class="s-navn">LYG Erhvervsklub</div>
  <div class="s-sub">Lyngbygaard Golf</div>
</div>

<div id="app">
  <!-- Install banner (Android/Chrome) -->
  <div id="install-banner" role="banner">
    <span>📲 Installér appen på din enhed</span>
    <button onclick="installApp()">Installér</button>
    <button class="luk-banner" onclick="document.getElementById('install-banner').style.display='none'" aria-label="Luk">✕</button>
  </div>

  <!-- Page content -->
  <main id="main-content" role="main" aria-live="polite" aria-atomic="false"></main>

  <!-- Bottom navigation — 8 faste punkter -->
  <nav id="bottom-nav" role="navigation" aria-label="Hovedmenu">
    <button class="nav-item active" data-side="forside" aria-label="Forside">
      <span class="nav-ikon">🏠</span><span class="nav-lbl">Forside</span>
    </button>
    <button class="nav-item" data-side="kalender" aria-label="Kalender">
      <span class="nav-ikon">📅</span><span class="nav-lbl">Kalender</span>
    </button>
    <button class="nav-item" data-side="tilmelding" aria-label="Tilmeld">
      <span class="nav-ikon">✅</span><span class="nav-lbl">Tilmeld</span>
    </button>
    <button class="nav-item" data-side="golfarr" aria-label="Golf">
      <span class="nav-ikon">⛳</span><span class="nav-lbl">Golf</span>
    </button>
    <button class="nav-item" data-side="sponsor" aria-label="Sponsor">
      <span class="nav-ikon">🌟</span><span class="nav-lbl">Sponsor</span>
    </button>
    <button class="nav-item" data-side="om" aria-label="EK">
      <span class="nav-ikon">🤝</span><span class="nav-lbl">EK</span>
    </button>
    <button class="nav-item" data-side="kontakt" aria-label="Kontakt">
      <span class="nav-ikon">✉️</span><span class="nav-lbl">Kontakt</span>
    </button>
    <button class="nav-item nav-admin" data-side="admin" aria-label="Admin">
      <span class="nav-ikon">⚙️</span><span class="nav-lbl">Admin</span>
    </button>
  </nav>
</div>

<script src="./app.js?v=4.2"></script>
</body>
</html>
